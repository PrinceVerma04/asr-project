<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASR Transcription</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5efe6;
      --panel: #fffdf9;
      --ink: #1f1b16;
      --muted: #6f6254;
      --accent: #b84c2a;
      --border: #dbcdbd;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #efe4d3 0%, var(--bg) 100%);
      color: var(--ink);
    }

    .wrap {
      max-width: 760px;
      margin: 48px auto;
      padding: 24px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(77, 51, 29, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 2rem;
    }

    p {
      color: var(--muted);
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 16px;
      margin-top: 24px;
    }

    label {
      font-weight: 600;
    }

    input, button {
      font: inherit;
    }

    input[type="file"], input[type="text"] {
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: white;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-weight: 700;
    }

    pre {
      white-space: pre-wrap;
      background: #f8f3ed;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      min-height: 72px;
    }

    .meta {
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Cohere ASR Demo</h1>
      <p>Upload an audio file, send it to the transcription pipeline, and save the result into the <code>output/</code> folder.</p>
      <p class="meta">Model: {{ model_id }}</p>

      <form id="upload-form">
        <div>
          <label for="audio">Audio file</label>
          <input id="audio" name="audio" type="file" accept=".wav,.mp3,.m4a,.flac,.ogg" required>
        </div>

        <div>
          <label for="lang">Language code</label>
          <input id="lang" name="lang" type="text" value="en">
        </div>

        <button type="submit">Transcribe</button>
      </form>

      <h2>Result</h2>
      <pre id="result">No transcription yet.</pre>
      <p class="meta" id="saved-path"></p>
    </div>
  </div>

  <script>
    const form = document.getElementById("upload-form");
    const result = document.getElementById("result");
    const savedPath = document.getElementById("saved-path");

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      result.textContent = "Uploading and transcribing...";
      savedPath.textContent = "";

      const formData = new FormData(form);
      const response = await fetch("/transcribe", {
        method: "POST",
        body: formData
      });

      const payload = await response.json();

      if (!response.ok) {
        result.textContent = payload.error || "Something went wrong.";
        return;
      }

      result.textContent = payload.text;
      savedPath.textContent = "Saved to: " + payload.saved_to;
    });
  </script>
</body>
</html>
